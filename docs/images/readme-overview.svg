<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Mihomo NAS 项目总览图</title>
  <desc id="desc">展示 mihomo-nas 从管理入口、配置真相、渲染链、运行面到观测诊断的整体流程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#eef3f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b6b85"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .panel { fill: #ffffff; stroke-width: 2; rx: 28; filter: url(#shadow); }
      .entry { stroke: #5aa0e6; }
      .truth { stroke: #4ca470; }
      .build { stroke: #d8a137; }
      .runtime { stroke: #d46a6a; }
      .observe { stroke: #8a65d2; }
      .title { font: 700 42px "Segoe UI","PingFang SC","Noto Sans CJK SC",sans-serif; fill: #10223d; }
      .subtitle { font: 500 18px "Segoe UI","PingFang SC","Noto Sans CJK SC",sans-serif; fill: #5c6b80; }
      .panel-title { font: 700 24px "Segoe UI","PingFang SC","Noto Sans CJK SC",sans-serif; fill: #183153; }
      .panel-sub { font: 500 14px "Segoe UI","PingFang SC","Noto Sans CJK SC",sans-serif; fill: #66788f; }
      .node { fill: #fbfdff; stroke: #d9e3ef; stroke-width: 1.6; rx: 18; }
      .node-title { font: 700 16px "Segoe UI","PingFang SC","Noto Sans CJK SC",sans-serif; fill: #20344d; }
      .node-sub { font: 500 13px "Segoe UI","PingFang SC","Noto Sans CJK SC",sans-serif; fill: #6a7c92; }
      .arrow { fill: none; stroke: #5b6b85; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .chip { fill: #ffffff; stroke: #d8e1eb; stroke-width: 1.5; rx: 999; }
      .chip-text { font: 600 14px "Segoe UI","PingFang SC","Noto Sans CJK SC",sans-serif; fill: #33465f; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980" rx="32"/>

  <text x="56" y="72" class="title">Mihomo NAS 项目总览</text>
  <text x="56" y="106" class="subtitle">README 首屏可用的信息图：从管理入口、真相配置、渲染链，到运行面和观测诊断</text>

  <rect class="panel entry" x="40" y="150" width="250" height="520"/>
  <text x="64" y="194" class="panel-title">1. 管理入口</text>
  <text x="64" y="218" class="panel-sub">用户从哪里触发项目能力</text>

  <rect class="node" x="62" y="246" width="206" height="82"/>
  <text x="84" y="276" class="node-title">mihomo CLI</text>
  <text x="84" y="302" class="node-sub">menu / setup / import-links /</text>
  <text x="84" y="320" class="node-sub">apply-default-template / status</text>

  <rect class="node" x="62" y="346" width="206" height="86"/>
  <text x="84" y="376" class="node-title">局域网设备</text>
  <text x="84" y="402" class="node-sub">把网关和 DNS 指向 NAS，</text>
  <text x="84" y="420" class="node-sub">复用旁路由能力</text>

  <rect class="node" x="62" y="450" width="206" height="86"/>
  <text x="84" y="480" class="node-title">宿主机应用</text>
  <text x="84" y="506" class="node-sub">默认直连；如需代理，</text>
  <text x="84" y="524" class="node-sub">显式走 127.0.0.1:7890</text>

  <rect class="node" x="62" y="554" width="206" height="86"/>
  <text x="84" y="584" class="node-title">控制面 / WebUI</text>
  <text x="84" y="610" class="node-sub">默认仅绑定</text>
  <text x="84" y="628" class="node-sub">127.0.0.1:19090</text>

  <rect class="panel truth" x="330" y="150" width="280" height="520"/>
  <text x="354" y="194" class="panel-title">2. 真相与配置输入</text>
  <text x="354" y="218" class="panel-sub">项目静态意图和本项目状态真相</text>

  <rect class="node" x="352" y="260" width="236" height="100"/>
  <text x="374" y="290" class="node-title">settings.env / router.env</text>
  <text x="374" y="316" class="node-sub">模板、端口、旁路由入口、</text>
  <text x="374" y="334" class="node-sub">控制面绑定、宿主机流量模式</text>

  <rect class="node" x="352" y="392" width="236" height="140"/>
  <text x="374" y="422" class="node-title">state/*.json</text>
  <text x="374" y="448" class="node-sub">nodes.json / rules.json /</text>
  <text x="374" y="466" class="node-sub">acl.json / subscriptions.json</text>
  <text x="374" y="492" class="node-sub">手动节点、规则、ACL、</text>
  <text x="374" y="510" class="node-sub">订阅状态都在这里落盘</text>

  <rect class="panel build" x="650" y="110" width="400" height="650"/>
  <text x="674" y="154" class="panel-title">3. 渲染链</text>
  <text x="674" y="178" class="panel-sub">把真相转成 Mihomo 可运行配置</text>

  <rect class="node" x="674" y="216" width="352" height="88"/>
  <text x="696" y="246" class="node-title">scripts/statectl.py / rulepreset.py</text>
  <text x="696" y="272" class="node-sub">处理节点、订阅、规则预设、规则仓库</text>

  <rect class="node" x="674" y="332" width="352" height="116"/>
  <text x="696" y="362" class="node-title">渲染产物</text>
  <text x="696" y="388" class="node-sub">proxy_providers/manual.txt</text>
  <text x="696" y="406" class="node-sub">proxy_providers/subscriptions/*.txt</text>
  <text x="696" y="424" class="node-sub">ruleset/custom.rules / acl.rules / builtin.rules</text>

  <rect class="node" x="674" y="476" width="352" height="94"/>
  <text x="696" y="506" class="node-title">lib/render.sh</text>
  <text x="696" y="532" class="node-sub">组装 config.yaml，处理权限、安装侧配套逻辑</text>

  <rect class="node" x="674" y="598" width="352" height="90"/>
  <text x="696" y="628" class="node-title">config.yaml</text>
  <text x="696" y="654" class="node-sub">最终交给 mihomo-core 的运行配置文件</text>

  <rect class="panel runtime" x="1090" y="188" width="220" height="310"/>
  <text x="1114" y="232" class="panel-title">4. 运行面</text>
  <text x="1114" y="256" class="panel-sub">真正承接流量的部分</text>

  <rect class="node" x="1112" y="292" width="176" height="84"/>
  <text x="1134" y="322" class="node-title">systemd</text>
  <text x="1134" y="348" class="node-sub">mihomo.service</text>

  <rect class="node" x="1112" y="398" width="176" height="84"/>
  <text x="1134" y="428" class="node-title">mihomo-core</text>
  <text x="1134" y="454" class="node-sub">DNS / TProxy / 策略执行</text>

  <rect class="panel observe" x="1350" y="150" width="210" height="440"/>
  <text x="1374" y="194" class="panel-title">5. 观测与诊断</text>
  <text x="1374" y="218" class="panel-sub">状态页到底在看什么</text>

  <rect class="node" x="1372" y="250" width="166" height="94"/>
  <text x="1394" y="280" class="node-title">status / runtime-audit</text>
  <text x="1394" y="306" class="node-sub">healthcheck</text>

  <rect class="node" x="1372" y="372" width="166" height="92"/>
  <text x="1394" y="402" class="node-title">本机诊断源</text>
  <text x="1394" y="428" class="node-sub">systemd / ss /</text>
  <text x="1394" y="446" class="node-sub">journalctl / iptables</text>

  <rect class="node" x="1372" y="492" width="166" height="82"/>
  <text x="1394" y="522" class="node-title">Mihomo REST API</text>
  <text x="1394" y="548" class="node-sub">/configs /proxies /version</text>

  <path class="arrow" d="M 268 287 C 300 287, 310 287, 352 287"/>
  <path class="arrow" d="M 268 390 C 300 390, 310 420, 352 420"/>
  <path class="arrow" d="M 588 310 C 628 310, 636 252, 674 252"/>
  <path class="arrow" d="M 588 460 C 628 460, 636 390, 674 390"/>
  <path class="arrow" d="M 1026 378 C 1050 378, 1072 334, 1112 334"/>
  <path class="arrow" d="M 1200 482 C 1230 550, 1320 550, 1372 550"/>
  <path class="arrow" d="M 268 493 C 720 493, 720 440, 1112 440"/>
  <path class="arrow" d="M 268 597 C 720 597, 720 440, 1112 440"/>
  <path class="arrow" d="M 268 597 C 820 597, 820 440, 1112 440"/>

  <rect class="chip" x="54" y="828" width="360" height="44"/>
  <text x="76" y="856" class="chip-text">局域网设备真正生效的前提：网关 + DNS 指向 NAS</text>

  <rect class="chip" x="436" y="828" width="360" height="44"/>
  <text x="458" y="856" class="chip-text">宿主机默认直连；需要代理时显式走 127.0.0.1:7890</text>

  <rect class="chip" x="818" y="828" width="368" height="44"/>
  <text x="840" y="856" class="chip-text">订阅缓存是 provider 输入真相，不再并回手动节点交互路径</text>

  <rect class="chip" x="1208" y="828" width="338" height="44"/>
  <text x="1230" y="856" class="chip-text">状态页优先读 Mihomo 运行态，控制面不可达时再回退</text>
</svg>
